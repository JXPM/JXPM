name: Générer la Snake de Contribution

on:
  schedule:
    # Toutes les 12 heures
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Générer la snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JXPM
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#D4AF37&color_dots=#161B22,#B8860B,#D4AF37,#F5DEB3,#F5F5F5

      - name: Pousser le SVG vers la branche output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

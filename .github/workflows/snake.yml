name: Générer la Snake de Contribution

on:
  schedule:
    # Toutes les 12 heures
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Générer la snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: JXPM
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_dots=#1E1B4B,#4F46E5,#6366F1,#8B5CF6,#A78BFA

      - name: Pousser le SVG vers la branche output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
